<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南京 - 复古翻页时钟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 引入适合复古时钟的无衬线粗体 */
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap');
        
        body {
            /* 黑色基调的动态渐变背景 */
            background: linear-gradient(-45deg, #000000, #121212, #050505, #1a1a1a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* 背景渐变动画 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 背景中心呼吸光晕 */
        .glow-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 60%);
            animation: pulse 6s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* 复古翻页卡片样式 */
        .flip-card {
            position: relative;
            background-color: #141414;
            color: #e5e5e5;
            font-family: 'Oswald', sans-serif;
            border-radius: 12px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.8), inset 0 2px 2px rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 120px;
            height: 160px;
            font-size: 6rem;
            font-weight: 700;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .flip-card { width: 160px; height: 200px; font-size: 8rem; }
        }

        /* 翻页卡片中间的分割线 */
        .flip-card::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #000000;
            box-shadow: 0 1px 1px rgba(255,255,255,0.1);
            transform: translateY(-50%);
        }

        /* 卡片上半部分的暗角效果 */
        .flip-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 100%);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center selection:bg-gray-700">

    <div class="glow-overlay"></div>

    <div class="z-10 flex flex-col items-center gap-12">
        
        <div class="flex items-center gap-4 md:gap-6">
            <div class="flip-card" id="hours">00</div>
            <div class="text-4xl md:text-6xl font-bold text-gray-500 pb-4 animate-pulse">:</div>
            <div class="flip-card" id="minutes">00</div>
            <div class="text-4xl md:text-6xl font-bold text-gray-500 pb-4 animate-pulse">:</div>
            <div class="flip-card" id="seconds">00</div>
        </div>

        <div class="flex flex-col items-center gap-2">
            <div class="flex items-center gap-4 text-xl md:text-2xl text-gray-300 bg-[#111111] px-8 py-4 rounded-xl border border-gray-800 shadow-2xl tracking-widest">
                <span class="text-gray-500 text-sm mr-2">📍 南京</span>
                <span id="weather-desc" class="font-medium text-gray-200">加载中</span>
                <span class="text-gray-700">|</span>
                <span id="temperature" class="font-medium">-- °C</span>
            </div>
            <div id="date" class="text-gray-500 text-sm tracking-widest mt-2">--</div>
        </div>

    </div>

    <script>
        // 1. 时钟更新逻辑
        function updateClock() {
            const now = new Date();
            
            document.getElementById('hours').textContent = String(now.getHours()).padStart(2, '0');
            document.getElementById('minutes').textContent = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('seconds').textContent = String(now.getSeconds()).padStart(2, '0');

            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('zh-CN', options);
        }
        
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 南京天气获取逻辑 (南京经纬度: 32.0603, 118.7969)
        const lat = 32.0603;
        const lon = 118.7969;
        
        async function fetchWeather() {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                
                if (data.current_weather) {
                    const temp = data.current_weather.temperature;
                    const weatherCode = data.current_weather.weathercode;
                    
                    // 将 WMO 气象代码转换为中文文字描述
                    let desc = '未知';
                    if (weatherCode === 0) desc = '晴朗'; 
                    else if (weatherCode >= 1 && weatherCode <= 3) desc = '多云';
                    else if (weatherCode === 45 || weatherCode === 48) desc = '雾';
                    else if (weatherCode >= 51 && weatherCode <= 67) desc = '雨';
                    else if (weatherCode >= 71 && weatherCode <= 77) desc = '雪';
                    else if (weatherCode >= 80 && weatherCode <= 82) desc = '阵雨';
                    else if (weatherCode >= 85 && weatherCode <= 86) desc = '阵雪';
                    else if (weatherCode >= 95) desc = '雷暴';
                    
                    document.getElementById('temperature').textContent = `${temp} °C`;
                    document.getElementById('weather-desc').textContent = desc;
                }
            } catch (error) {
                console.error('天气获取失败:', error);
                document.getElementById('temperature').textContent = '离线';
                document.getElementById('weather-desc').textContent = '获取失败';
            }
        }
        
        fetchWeather();
        // 每 30 分钟刷新一次天气
        setInterval(fetchWeather, 30 * 60 * 1000);
    </script>
</body>
</html>
