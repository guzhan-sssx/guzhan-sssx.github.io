<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机壁纸实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 全屏背景平铺设置 */
        .bg-wallpaper {
            background-image: url('https://source.unsplash.com/random/1920x1080?nature,scenery');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
        }
        /* 毛玻璃容器 */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-wallpaper h-screen flex items-center justify-center">

    <div class="glass-card p-10 rounded-3xl text-center shadow-2xl max-w-md mx-4">
        <h1 class="text-3xl font-bold text-white mb-4 drop-shadow-md">
            随机壁纸
        </h1>
        <p class="text-white/80 mb-8 leading-relaxed">
            每一次刷新，都是一场未知的视觉旅行。
        </p>
        
        <div class="flex flex-col gap-3">
            <button onclick="location.reload()" 
                    class="px-8 py-3 bg-white text-slate-900 rounded-xl font-bold hover:scale-105 transition-transform active:scale-95 shadow-lg">
                更换一张
            </button>
            
            <p class="text-xs text-white/50 mt-4 italic">
                Powered by Unsplash Engine
            </p>
        </div>
    </div>

    <footer class="fixed bottom-6 text-white/40 text-sm">
        按下 <kbd class="bg-white/20 px-2 py-1 rounded text-xs text-white">F5</kbd> 发现更多美感
    </footer>

</body>
</html>
