<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简黑 - 时钟与天气</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 引入具有科技感的等宽字体，非常适合数字时钟 */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: #050505; /* 纯正的深黑色背景 */
        }
        /* 为时钟添加轻微的发光效果 */
        .glow-text {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body class="text-gray-200 h-screen flex flex-col items-center justify-center overflow-hidden selection:bg-gray-700">

    <div class="flex flex-col items-center gap-10">
        
        <div id="clock" class="text-7xl md:text-9xl font-bold tracking-widest text-white glow-text transition-all">
            00:00:00
        </div>

        <div class="flex items-center gap-4 text-xl md:text-2xl text-gray-400 bg-[#111111] px-8 py-4 rounded-2xl border border-gray-800 shadow-2xl">
            <span id="weather-icon" class="text-2xl">⏳</span>
            <span id="temperature" class="font-medium">加载天气中...</span>
        </div>

    </div>

    <div id="date" class="fixed bottom-10 text-gray-500 text-sm tracking-widest">
        --
    </div>

    <script>
        // 1. 时间和日期更新功能
        function updateTime() {
            const now = new Date();
            
            // 格式化时间
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

            // 格式化日期
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('zh-CN', options);
        }
        
        setInterval(updateTime, 1000); // 每秒刷新一次
        updateTime(); // 立即执行一次，避免页面加载时的延迟

        // 2. 天气获取功能 (使用免费的 Open-Meteo API)
        // 默认经纬度设置为新加坡 (你可以修改 lat 和 lon 变量为你所在的城市)
        const lat = 1.3521;
        const lon = 103.8198;
        
        async function fetchWeather() {
            try {
                // 调用天气接口
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                
                if (data.current_weather) {
                    const temp = data.current_weather.temperature;
                    const weatherCode = data.current_weather.weathercode;
                    
                    // 根据 WMO 国际气象代码转换对应的 Emoji 图标
                    let icon = '☁️';
                    if (weatherCode === 0) icon = '☀️'; // 晴朗
                    else if (weatherCode >= 1 && weatherCode <= 3) icon = '⛅'; // 多云/阴天
                    else if (weatherCode >= 51 && weatherCode <= 67) icon = '🌧️'; // 雨
                    else if (weatherCode >= 71 && weatherCode <= 77) icon = '❄️'; // 雪
                    else if (weatherCode >= 95) icon = '⛈️'; // 雷暴
                    
                    // 更新页面显示
                    document.getElementById('temperature').textContent = `${temp} °C`;
                    document.getElementById('weather-icon').textContent = icon;
                }
            } catch (error) {
                console.error('天气获取失败:', error);
                document.getElementById('temperature').textContent = '数据离线';
                document.getElementById('weather-icon').textContent = '⚠️';
            }
        }
        
        fetchWeather();
        // 每 30 分钟 (1800000 毫秒) 后台自动刷新一次天气数据
        setInterval(fetchWeather, 30 * 60 * 1000);
    </script>
</body>
</html>
